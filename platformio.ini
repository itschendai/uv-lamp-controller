[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/ArduinoBLE@^2.0.2

; UNO R4 WiFi uploads over USB use sam-ba by default.
; If sam-ba upload cannot find the bootloader, double-tap RESET on the board
; and run the upload command again while it is in bootloader mode.
